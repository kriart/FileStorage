<!doctype html>
<html lang="{{.Language}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/app.js" defer></script>
</head>
<body class="auth-page" data-theme="{{.Theme}}">
  {{if .Flash}}<div class="toast-stack"><div class="toast {{.Flash.Kind}}" role="status">{{.Flash.Message}}</div></div>{{end}}
  <main class="auth-shell">
    <div class="auth-brand">
      <span class="brand-tile">FS</span>
      <div>
        <h1>File Storage</h1>
        <p class="muted">Создайте аккаунт</p>
      </div>
    </div>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="post" action="/register" class="stack">
      <label><span>Имя пользователя</span> <input name="username" autocomplete="username" required></label>
      <label>Email <input name="email" type="email" autocomplete="email" required></label>
      <label><span>Пароль</span> <input name="password" type="password" autocomplete="new-password" minlength="8" required></label>
      <button type="submit">Зарегистрироваться</button>
    </form>
    <p class="muted"><a href="/login">Войти</a></p>
  </main>
</body>
</html>
