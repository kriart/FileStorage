services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: file_storage
      POSTGRES_USER: file_storage
      POSTGRES_PASSWORD: file_storage
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U file_storage -d file_storage"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    command: ["/app/migrate", "up"]
    environment:
      DATABASE_URL: postgres://file_storage:file_storage@postgres:5432/file_storage?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://file_storage:file_storage@postgres:5432/file_storage?sslmode=disable
      FILE_STORAGE_ROOT: /data/file-storage
      JWT_SECRET: local-compose-secret-change-before-production
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      CLEANUP_INTERVAL: 1h
      STAGED_FILE_TTL: 24h
      ORPHAN_FILE_TTL: 24h
    ports:
      - "8080:8080"
    volumes:
      - file-data:/data/file-storage
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  file-data:
